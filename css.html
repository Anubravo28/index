<!DOCTYPE html>
<html>
<head>
    <title>Simple E-Commerce Site</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My Online Store</h1>
        <p>Best Products at Best Prices</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 1</h3>
            <p class="price">$10</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 2</h3>
            <p class="price">$20</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Product 3</h3>
            <p class="price">$30</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

    </div>

    <footer>
        <p>© 2026 My Online Store</p>
    </footer>

    <script>
        function addToCart() {
            alert("Product added to cart!");
        }
    </script>

</body>
</html>
